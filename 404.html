<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — cookieesandcakes</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/navbar.css">
  <link rel="stylesheet" href="styles/footer.css">
  <style>
    .error-page {
      min-height: calc(100vh - var(--nav-height));
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-16) var(--space-6);
      background: var(--gradient-hero);
    }
    .error-page__inner { max-width: 540px; }
    .error-page__emoji {
      font-size: 6rem;
      line-height: 1;
      margin-bottom: var(--space-6);
      animation: wobble 2s ease-in-out infinite;
    }
    .error-page__code {
      font-family: var(--font-heading);
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      color: var(--color-mauve);
      line-height: 1;
      margin-bottom: var(--space-4);
    }
    .error-page__title {
      font-size: var(--text-xl);
      color: var(--color-chocolate);
      margin-bottom: var(--space-4);
    }
    .error-page__desc {
      color: var(--color-text-muted);
      line-height: var(--leading-loose);
      margin-bottom: var(--space-8);
    }
    .error-page__actions {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      flex-wrap: wrap;
    }
    @keyframes wobble {
      0%,100% { transform: rotate(-5deg); }
      50%      { transform: rotate(5deg); }
    }
  </style>
</head>
<body>
  <header id="navbar" class="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">
        <img src="assets/images/logo/logo.svg" alt="cookieesandcakes logo" class="navbar__logo-img" width="48" height="48">
      </a>
      <nav class="navbar__links">
        <a href="index.html"   class="navbar__link">Home</a>
        <a href="menu.html"    class="navbar__link">Menu</a>
        <a href="about.html"   class="navbar__link">About</a>
      </nav>
      <div class="navbar__actions">
        <a href="order.html" class="btn btn--primary navbar__cta">Order Now</a>
        <button class="navbar__hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobile-nav">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>
  <nav class="navbar__mobile" id="mobile-nav">
    <div class="navbar__mobile-links">
      <a href="index.html"   class="navbar__mobile-link">Home</a>
      <a href="menu.html"    class="navbar__mobile-link">Menu</a>
      <a href="about.html"   class="navbar__mobile-link">About</a>
    </div>
    <a href="order.html" class="btn btn--primary navbar__mobile-cta">Order Now →</a>
  </nav>

  <main class="error-page">
    <div class="error-page__inner">
      <div class="error-page__emoji" aria-hidden="true">🍪</div>
      <p class="error-page__code">404</p>
      <h1 class="error-page__title">Oops! This page crumbled.</h1>
      <p class="error-page__desc">
        Looks like this page got eaten — probably by someone who couldn't resist. 
        Let's get you back to the good stuff.
      </p>
      <div class="error-page__actions">
        <a href="index.html" class="btn btn--primary btn--lg">← Back to Home</a>
        <a href="menu.html"  class="btn btn--secondary btn--lg">Browse Menu</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__bottom" style="max-width:var(--max-width);margin:0 auto;">
      <p class="footer__copy">© 2024 <a href="index.html">cookieesandcakes</a>. All rights reserved.</p>
    </div>
  </footer>

  <script type="module">import './js/navbar.js';</script>
</body>
</html>
