<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | cookieesandcakes</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/global.css">
  <style>
    body { background: var(--color-cream); min-height: 100vh; display: flex; flex-direction: column; }
    .admin-header { background: var(--color-chocolate); color: var(--color-cream); padding: var(--space-4) var(--space-6); display: flex; justify-content: space-between; align-items: center; }
    .admin-logo { font-family: var(--font-heading); font-weight: bold; font-size: 1.2rem; }
    
    .form-group { text-align: left; margin-bottom: var(--space-4); }
    .form-group label { display: block; font-weight: 600; margin-bottom: var(--space-2); font-size: 0.9rem; }
    .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--color-mauve-light); border-radius: var(--radius-sm); font-family: inherit; font-size: 1rem; }
    .btn-full { width: 100%; margin-top: var(--space-2); }
    
    /* Dashboard Container */
    #dashboard-view { display: none; flex: 1; padding: var(--space-8) var(--space-6); max-width: 1200px; margin: 0 auto; width: 100%; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6); }
    
    .table-container { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: var(--space-4); border-bottom: 1px solid #eee; }
    th { font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
    .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: var(--radius-sm); }
    
    .action-btn { background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-weight: 600; font-size: 0.85rem; }
    .btn-edit { color: #0284c7; }
    .btn-edit:hover { background: #e0f2fe; }
    .btn-delete { color: var(--color-error); }
    .btn-delete:hover { background: #fee2e2; }

    /* Modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; padding: var(--space-4); z-index: 100; }
    .modal.active { display: flex; }
    .modal-content { background: #fff; padding: var(--space-6); border-radius: var(--radius-lg); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4); }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
  </style>
</head>
<body>

  <header class="admin-header">
    <div class="admin-logo">cookieesandcakes admin</div>
    <button id="btn-logout" class="btn btn--sm" style="display:none;background:rgba(255,255,255,0.2);color:white;border:none;">Logout</button>
  </header>

  <!-- Dashboard View -->
  <main id="dashboard-view">
    <div class="dashboard-header">
      <h2>Products</h2>
      <button id="btn-add-product" class="btn btn--primary">+ Add Product</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="product-list">
          <tr><td colspan="5" style="text-align:center;padding:2rem;">Loading products...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Product Modal -->
  <div class="modal" id="product-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Add Product</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="product-form">
        <input type="hidden" id="prod-id">
        
        <div class="form-group">
          <label for="prod-name">Name *</label>
          <input type="text" id="prod-name" class="form-control" required>
        </div>
        
        <div class="form-group">
          <label for="prod-category">Category *</label>
          <select id="prod-category" class="form-control" required>
            <option value="cookies">Cookies</option>
            <option value="cakes">Cakes</option>
            <option value="brownies">Brownies</option>
            <option value="gift-boxes">Gift Boxes</option>
            <option value="seasonal">Seasonal</option>
          </select>
        </div>

        <div class="form-group" style="display:flex;gap:1rem;">
          <div style="flex:1;">
            <label for="prod-price">Price ($) *</label>
            <input type="number" id="prod-price" class="form-control" step="0.01" min="0" required>
          </div>
          <div style="flex:1;">
            <label for="prod-unit">Unit</label>
            <input type="text" id="prod-unit" class="form-control" placeholder="e.g. / half-dozen">
          </div>
        </div>

        <div class="form-group">
          <label for="prod-image">Image URL</label>
          <input type="text" id="prod-image" class="form-control" placeholder="assets/images/products/...">
        </div>

        <div class="form-group">
          <label for="prod-tags">Tags (comma separated)</label>
          <input type="text" id="prod-tags" class="form-control" placeholder="bestseller, seasonal">
        </div>

        <div class="form-group">
          <label for="prod-desc">Description</label>
          <textarea id="prod-desc" class="form-control" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn--primary btn-full" id="btn-save">Save Product</button>
      </form>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
