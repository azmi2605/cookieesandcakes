<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cookie bottom half (circle) -->
  <circle cx="100" cy="130" r="58" fill="#D4A97A" stroke="#5C3A21" stroke-width="5"/>
  <!-- Cookie inner fill -->
  <circle cx="100" cy="130" r="52" fill="#E8C49A"/>
  <!-- Chocolate chips -->
  <circle cx="78"  cy="122" r="6.5" fill="#5C3A21"/>
  <circle cx="100" cy="135" r="6.5" fill="#5C3A21"/>
  <circle cx="122" cy="122" r="6.5" fill="#5C3A21"/>
  <circle cx="85"  cy="148" r="5.5" fill="#3D2418"/>
  <circle cx="115" cy="148" r="5.5" fill="#3D2418"/>
  <circle cx="68"  cy="142" r="5"   fill="#3D2418"/>
  <circle cx="132" cy="142" r="5"   fill="#3D2418"/>
  <!-- Clip the bottom cookie to only show lower half -->
  <!-- Cream divider band -->
  <rect x="42" y="82" width="116" height="20" rx="10" fill="#F3E3CC" stroke="#5C3A21" stroke-width="5"/>
  <!-- Cake bottom cream layer -->
  <rect x="52" y="58" width="96" height="26" rx="10" fill="#F3E3CC" stroke="#5C3A21" stroke-width="5"/>
  <!-- Cake top mauve/pink layer -->
  <rect x="60" y="36" width="80" height="24" rx="10" fill="#C98B7D" stroke="#5C3A21" stroke-width="5"/>
  <!-- Cake top white frosting / top tier -->
  <rect x="68" y="20" width="64" height="18" rx="9" fill="#F3E3CC" stroke="#5C3A21" stroke-width="5"/>
  <!-- Cherry / bow knot -->
  <circle cx="100" cy="13" r="8" fill="#C98B7D" stroke="#5C3A21" stroke-width="4"/>
  <!-- Stem curl -->
  <path d="M97 11 Q92 2 96 5" stroke="#5C3A21" stroke-width="3.5" stroke-linecap="round" fill="none"/>
</svg>
