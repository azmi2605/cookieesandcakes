<body class="font-body-md text-on-surface min-h-screen flex flex-col">
    <div data-include-header="/header/header.html"></div>
    <main class="max-w-[1200px] mx-auto px-md py-xl flex-grow">
        <!-- Welcome Section -->
        <section class="mb-xl animate-in fade-in slide-in-from-bottom-4 duration-700">
            <h1 class="font-headline-xl text-headline-xl text-primary mb-xs">Personal Information</h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant">Update your profile details and preferences.</p>
        </section>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-xl">
            <!-- Sidebar Navigation -->
            <aside class="lg:col-span-3">
                <div class="space-y-base">
                    <h2 class="font-label-md text-label-md text-outline mb-md uppercase tracking-widest">Account Hub
                    </h2>
                    <nav class="flex flex-col gap-xs">
                        <a class="flex items-center gap-sm p-md rounded-xl bg-surface-container-highest text-primary font-bold transition-all duration-200 cursor-pointer"
                            href="/account-profile.html">
                            <span class="material-symbols-outlined" data-icon="person">person</span>
                            <span class="font-label-md text-label-md">Personal Information</span>
                        </a>
                        <a class="flex items-center gap-sm p-md rounded-xl text-on-surface-variant hover:bg-surface-container-low hover:text-primary transition-all duration-200 cursor-pointer"
                            href="/shipping-addresses.html">
                            <span class="material-symbols-outlined" data-icon="local_shipping">local_shipping</span>
                            <span class="font-label-md text-label-md">Shipping Addresses</span>
                        </a>
                        <a class="flex items-center gap-sm p-md rounded-xl text-on-surface-variant hover:bg-surface-container-low hover:text-primary transition-all duration-200 cursor-pointer"
                            href="/security-settings.html">
                            <span class="material-symbols-outlined" data-icon="lock_person">lock_person</span>
                            <span class="font-label-md text-label-md">Password &amp; Security</span>
                        </a>
                        <a class="flex items-center gap-sm p-md rounded-xl text-secondary hover:bg-secondary-fixed transition-all duration-200 mt-lg cursor-pointer"
                            href="/login.html">
                            <span class="material-symbols-outlined" data-icon="logout">logout</span>
                            <span class="font-label-md text-label-md">Sign Out</span>
                        </a>
                    </nav>
                </div>
            </aside>
            <!-- Main Content Area -->
            <div class="lg:col-span-9 space-y-xl">
                <section>
                    <div class="bg-surface-container-lowest p-lg rounded-xl butter-shadow border border-outline-variant/20">
                        <h3 class="font-headline-lg text-headline-lg text-primary mb-lg">Profile Details</h3>
                        <form class="space-y-lg" id="profile-form">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
                                <div>
                                    <label class="block font-label-md text-label-md text-on-surface mb-xs">Full Name</label>
                                    <input id="profile-name" type="text" class="w-full p-md rounded-xl border border-outline-variant bg-surface-container-low focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all" />
                                </div>
                                <div>
                                    <label class="block font-label-md text-label-md text-on-surface mb-xs">Username</label>
                                    <input id="profile-username" type="text" disabled class="w-full p-md rounded-xl border border-outline-variant bg-surface-container-low text-on-surface-variant cursor-not-allowed" />
                                    <p class="text-label-sm text-outline mt-xs">Username cannot be changed.</p>
                                </div>
                            </div>
                            <div>
                                <label class="block font-label-md text-label-md text-on-surface mb-xs">Email Address</label>
                                <input id="profile-email" type="email" disabled class="w-full p-md rounded-xl border border-outline-variant bg-surface-container-low text-on-surface-variant cursor-not-allowed" />
                                <p class="text-label-sm text-outline mt-xs">Email is used for login and cannot be changed.</p>
                            </div>
                            <div>
                                <label class="block font-label-md text-label-md text-on-surface mb-xs">Phone Number</label>
                                <input id="profile-phone" type="tel" class="w-full p-md rounded-xl border border-outline-variant bg-surface-container-low focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all" />
                            </div>
                            <div class="flex justify-end">
                                <button type="submit" class="bg-secondary text-white px-lg py-md rounded-xl font-label-md text-label-md hover:opacity-90 active:scale-95 transition-all">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </main>
    <!-- Footer Shell -->
    <div data-include-footer="/footer/footer.html"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.snap-start');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('opacity-100');
                        entry.target.classList.remove('opacity-0', 'translate-y-4');
                    }
                });
            }, { threshold: 0.1 });

            cards.forEach(card => {
                card.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-4');
                observer.observe(card);
            });
        });

        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>

    <script src="/js/skeleton.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script>
        (function () {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initActiveNav);
            } else {
                initActiveNav();
            }
            function initActiveNav() {
                const path = window.location.pathname;
                const navLinks = document.querySelectorAll('aside nav a');
                navLinks.forEach(link => {
                    const href = link.getAttribute('href') || '';
                    const isActive = path === href || (href !== '/account.html' && path.includes(href.replace('.html', '')));
                    if (isActive) {
                        link.classList.add('bg-surface-container-highest', 'text-primary', 'font-bold');
                        link.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-low', 'hover:text-primary');
                    } else {
                        link.classList.remove('bg-surface-container-highest', 'text-primary', 'font-bold');
                        link.classList.add('text-on-surface-variant', 'hover:bg-surface-container-low', 'hover:text-primary');
                    }
                });
            }
        })();

        (async function loadProfile() {
            const nameInput = document.getElementById('profile-name');
            const usernameInput = document.getElementById('profile-username');
            const emailInput = document.getElementById('profile-email');
            const phoneInput = document.getElementById('profile-phone');
            const form = document.getElementById('profile-form');

            try {
                const data = await window.App.fetchAPI('/api/auth/session');
                if (!data.loggedIn || !data.user) return;
                const user = data.user;

                if (nameInput) nameInput.value = user.name || '';
                if (usernameInput) usernameInput.value = user.username || (user.email ? user.email.split('@')[0] : '');
                if (emailInput) emailInput.value = user.email || '';
                if (phoneInput) phoneInput.value = user.phone || '';

                window.App.user = user;
            } catch (err) {
                console.error('Failed to load profile:', err.message);
            }

            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const name = nameInput ? nameInput.value.trim() : '';
                    const phone = phoneInput ? phoneInput.value.trim() : '';

                    try {
                        const result = await window.App.fetchAPI('/api/auth/profile', {
                            method: 'POST',
                            body: { name, phone }
                        });

                        if (result.user) {
                            window.App.user = result.user;
                        }

                        window.App.toastSuccess('Profile updated successfully!');
                    } catch (err) {
                        window.App.toastError(err.message || 'Failed to update profile.');
                    }
                });
            }
        })();
    </script>

    <script src="/js/chatbot.js" defer></script>
</body>

</html>
