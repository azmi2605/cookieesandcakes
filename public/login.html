<body class="min-h-screen flex flex-col font-body-md text-on-background">
    <!-- Top Navigation (Shell logic: Supressed for login) -->
    <main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-xl">
        <div class="w-full max-w-[480px]">
            <!-- Branding & Welcome -->
            <div class="text-center mb-lg">
                <div class="flex justify-center mb-md">
                    <img alt="cookieesandcakes logo"
                        class="h-24 w-auto drop-shadow-sm transition-transform duration-500 hover:scale-105"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdcBZhe-qc8x2zMtuCpIRLA-L9A5lJQf_MJCE1Jrs1tsCPv_Vmv-499GwtXEfYcQ51ATAa4kTw2HpPDYKb050qilHP39RoqAp9A13jT2uAZGL9OnugcyclR0qamfgrC5AiBoEq1_lLyjEew4KovUYPxs5gsxQr-roQtB4CxtzpI_7hctVgUx9IgcPVhjQdHzihJfpFqdenWbk7HoIlXDAGw7blr2uUx7QaGNmyV31xQDBp_I7YHkIrcJRPjSyx4o-C1Viegf_Tlgw" />
                </div>
                <h1 class="font-headline-lg text-headline-lg text-primary tracking-tight mb-xs">Welcome Back, Cookie
                    Lover</h1>
                <p class="font-body-md text-on-surface-variant">Sign in to access your freshly baked treats.</p>
            </div>
            <!-- Login Card -->
            <div class="bg-surface-container-lowest butter-shadow rounded-xl p-md md:p-lg">
                <form class="space-y-md" id="loginForm">
                    <!-- Email Field -->
                    <div class="space-y-xs">
                        <label class="font-label-md text-label-md text-primary block" for="email">Email Address</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-0 focus:border-primary transition-all placeholder:text-outline-variant"
                                id="email" placeholder="baker@cookieesandcakes.com" required="" type="email" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="space-y-xs">
                        <div class="flex justify-between items-center">
                            <label class="font-label-md text-label-md text-primary block"
                                for="password">Password</label>
                            <a class="font-label-sm text-label-sm text-secondary hover:underline transition-all"
                                href="/reset-password.html">Forgot Password?</a>
                        </div>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
                            <input
                                class="w-full pl-10 pr-12 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-0 focus:border-primary transition-all placeholder:text-outline-variant"
                                id="password" placeholder="••••••••" required="" type="password" />
                            <button
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary"
                                onclick="togglePassword()" type="button">
                                <span class="material-symbols-outlined" id="passwordIcon">visibility</span>
                            </button>
                        </div>
                    </div>
                    <!-- Remember Me -->
                    <div class="flex items-center space-x-2">
                        <input
                            class="w-4 h-4 text-secondary border-outline-variant rounded focus:ring-secondary/20 bg-surface-container-low"
                            id="remember" type="checkbox" />
                        <label class="font-label-sm text-label-sm text-on-surface-variant cursor-pointer select-none"
                            for="remember">Remember my sweet tooth</label>
                    </div>
                    <!-- Action Buttons -->
                    <div class="pt-2 space-y-md">
                        <button
                            class="w-full bg-secondary text-on-secondary py-4 px-6 rounded-lg font-label-md text-label-md shadow-md hover:bg-secondary/90 active:scale-[0.98] transition-all duration-200"
                            type="submit">
                            Sign In
                        </button>
                        <div class="relative flex items-center py-2">
                            <div class="flex-grow border-t border-outline-variant/30"></div>
                            <span class="flex-shrink mx-4 font-label-sm text-label-sm text-outline-variant">OR CONTINUE
                                WITH</span>
                            <div class="flex-grow border-t border-outline-variant/30"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-md">
                            <button
                                class="flex items-center justify-center space-x-2 py-3 border border-outline-variant rounded-lg hover:bg-surface-container transition-colors active:scale-95 duration-200"

                                <span class="font-label-sm text-label-sm text-primary">Google</span>
                            </button>
                            <button
                                class="flex items-center justify-center space-x-2 py-3 border border-outline-variant rounded-lg hover:bg-surface-container transition-colors active:scale-95 duration-200"
                                type="button">
                                <span class="material-symbols-outlined text-primary"
                                    style="font-variation-settings: 'FILL' 1;">apps</span>
                                <span class="font-label-sm text-label-sm text-primary">Apple</span>
                            </button>
                        </div>
                    </div>
                </form>
                <!-- Signup Link -->

                    New to the kitchen?

        </div>
    </div>

        <div
            class="relative w-[300px] h-[300px] bg-primary-container rounded-full blur-[80px] translate-x-1/3 -translate-y-1/3">

    <footer class="py-md text-center">
        <p class="font-label-sm text-label-sm text-outline-variant uppercase tracking-widest">© 2026 cookieesandcakes.
            Handcrafted with love.</p>
    </footer>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
            btn.disabled = true;

            // Mock login delay
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('Welcome to the bakery! (Mock action)');
            }, 1500);
        });
    </script>

    <script src="/js/auth.js" defer></script>
</body>
