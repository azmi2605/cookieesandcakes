<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
    <div data-include-header="/header/header.html"></div>
    <main class="flex-grow max-w-[1200px] mx-auto px-margin-desktop py-xl w-full">
        <div class="mb-lg">
            <h1 class="font-headline-xl text-headline-xl text-primary mb-xs">Personalize Your Gift</h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">Add a touch of artisanal warmth with
                a hand-written note on our premium cardstock.</p>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-xl items-start">
            <!-- Editor Section -->
            <section class="space-y-md">
                <div class="bg-surface-container-low p-md rounded-xl butter-shadow border border-outline-variant/30">
                    <!-- Formatting Toolbar -->
                    <div class="flex flex-wrap items-center gap-sm mb-md pb-md border-b border-outline-variant/50">
                        <div class="flex bg-surface-container-high rounded-lg p-xs">
                            <button
                                class="p-xs px-sm hover:bg-surface-container-highest rounded-md transition-colors material-symbols-outlined text-on-surface-variant"
                                data-icon="format_bold" id="btnBold">format_bold</button>
                            <button
                                class="p-xs px-sm hover:bg-surface-container-highest rounded-md transition-colors material-symbols-outlined text-on-surface-variant"
                                data-icon="format_italic" id="btnItalic">format_italic</button>
                        </div>
                        <div class="h-6 w-px bg-outline-variant"></div>
                        <select
                            class="bg-surface-container-high border-none rounded-lg text-label-md font-label-md text-on-surface-variant focus:ring-secondary cursor-pointer py-1.5 px-md"
                            id="fontSelector">
                            <option class="font-headline-md" value="font-headline-md">Elegant Serif</option>
                            <option class="font-script" value="font-script">Artisanal Script</option>
                            <option class="font-body-md" value="font-body-md">Modern Sans</option>
                        </select>
                    </div>
                    <!-- Text Area -->
                    <div class="relative">
                        <label class="sr-only" for="giftMessage">Gift Message</label>
                        <textarea
                            class="w-full min-h-[240px] bg-transparent border-none focus:ring-0 text-body-lg font-body-lg text-primary resize-none placeholder:text-outline/50 custom-scrollbar"
                            id="giftMessage" maxlength="150" placeholder="Write your message here..."></textarea>
                        <!-- Character Counter -->
                        <div class="absolute bottom-2 right-2 text-label-sm font-label-sm text-outline">
                            <span id="charCount">0</span>/150
                        </div>
                    </div>
                </div>
                <div class="p-sm bg-surface-container-highest/30 rounded-lg flex gap-sm items-start">
                    <span class="material-symbols-outlined text-secondary scale-75" data-icon="info">info</span>
                    <p class="text-label-sm font-label-sm text-on-surface-variant italic">Messages are printed exactly
                        as entered using archival-quality inks on cream linen paper.</p>
                </div>
            </section>
            <!-- Preview Section -->
            <section class="sticky top-32">
                <div
                    class="relative aspect-square w-full rounded-xl overflow-hidden butter-shadow bg-surface-container-high">
                    <!-- Bakery Background Image -->
                    <div class="absolute inset-0 z-0 bg-cover bg-center"
                        data-alt="A professional top-down photography shot of an open artisanal bakery box filled with assorted chocolate chip cookies and pastries next to a minimalist cream-colored gift card resting on a light wood surface. The lighting is soft and warm, casting gentle 'butter shadows' across the textures. The overall aesthetic is clean, sophisticated, and inviting, following the Artisanal Warmth brand style."
                        style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCIcyQQeZGNA-U49pN5lzhdJkKW4WYumSStp54MFkUuyJkl7V4V-QXYyDR15a6iCkfsEJb5r1GM4555Qcj9UT9ZaaZSrnQViXfAZ6jidxyREx1jFrQCPOyQMuvU2K8fqOnNV05xOBKXIV9MgpW3IHx6Mq81EIJeVXyISjQ0TQmfdqgiv_aag9h8nukmfE7B-doizl1lDXm7aDi5kBNw7QT1XVh2SmVtdw5xfWB0QZCFDnCjqM48bKY_WVy-Jm305qE3t9WL8CkzfHs')">
                    </div>
                    <!-- Card Overlay Overlay -->
                    <div class="absolute inset-0 bg-black/5 z-10 pointer-events-none"></div>
                    <!-- Live Message Card -->
                    <div
                        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 w-4/5 aspect-[5/3.5] bg-[#fffcf5] rounded-sm butter-shadow transform -rotate-1 p-md flex flex-col justify-between border border-[#f3ead3]">
                        <div class="w-full h-full flex flex-col items-center justify-center text-center overflow-hidden"
                            id="previewContainer">
                            <p class="font-headline-md text-headline-md text-primary opacity-90 break-words w-full max-h-full leading-relaxed transition-all duration-300"
                                id="livePreview">
                                Your message will appear here...
                            </p>
                        </div>
                        <div class="absolute bottom-4 right-6 opacity-20 scale-50">
                            <div class="font-headline-lg text-secondary">cookieesandcakes</div>
                        </div>
                    </div>
                    <!-- Visual Accents -->
                    <div
                        class="absolute bottom-4 left-4 z-30 bg-surface/80 backdrop-blur-sm px-md py-xs rounded-full border border-outline-variant/30 flex items-center gap-xs">
                        <span class="material-symbols-outlined text-secondary text-base"
                            data-icon="visibility">visibility</span>
                        <span class="text-label-sm font-label-sm text-on-surface-variant">Live Preview</span>
                    </div>
                </div>
            </section>
        </div>
        <!-- Footer Actions -->
        <div
            class="mt-xl flex flex-col sm:flex-row items-center justify-center gap-md pt-lg border-t border-outline-variant/20">
            <button
                class="w-full sm:w-auto px-xl py-md bg-secondary text-on-secondary rounded-full font-label-md text-label-md shadow-lg hover:brightness-110 active:scale-95 transition-all duration-200">
                Add to Cake
            </button>
            <button
                class="w-full sm:w-auto px-xl py-md text-primary font-label-md text-label-md hover:underline active:opacity-80 transition-all">
                Cancel
            </button>
        </div>
    </main>
    <!-- Footer Component -->
    <div data-include-footer="/footer/footer.html"></div>
    <script>
        const giftMessage = document.getElementById('giftMessage');
        const livePreview = document.getElementById('livePreview');
        const charCount = document.getElementById('charCount');
        const fontSelector = document.getElementById('fontSelector');
        const btnBold = document.getElementById('btnBold');
        const btnItalic = document.getElementById('btnItalic');

        let isBold = false;
        let isItalic = false;

        giftMessage.addEventListener('input', (e) => {
            const text = e.target.value;
            charCount.textContent = text.length;

            if (text.trim() === '') {
                livePreview.textContent = 'Your message will appear here...';
                livePreview.classList.add('opacity-40');
            } else {
                livePreview.textContent = text;
                livePreview.classList.remove('opacity-40');
            }
        });

        fontSelector.addEventListener('change', (e) => {
            livePreview.classList.remove('font-headline-md', 'font-script', 'font-body-md', 'text-headline-md', 'text-script', 'text-body-md');
            const selectedFont = e.target.value;

            // Map the font class to its corresponding size class
            const sizeClass = selectedFont.replace('font-', 'text-');
            livePreview.classList.add(selectedFont, sizeClass);

            // Adjust spacing for script font
            if (selectedFont === 'font-script') {
                livePreview.classList.add('text-4xl', 'leading-relaxed');
            } else {
                livePreview.classList.remove('text-4xl', 'leading-relaxed');
            }
        });

        btnBold.addEventListener('click', () => {
            isBold = !isBold;
            btnBold.classList.toggle('bg-surface-container-highest', isBold);
            livePreview.classList.toggle('font-bold', isBold);
        });

        btnItalic.addEventListener('click', () => {
            isItalic = !isItalic;
            btnItalic.classList.toggle('bg-surface-container-highest', isItalic);
            livePreview.classList.toggle('italic', isItalic);
        });

        // Initial setup
        const initialFont = fontSelector.value;
        livePreview.classList.add(initialFont, initialFont.replace('font-', 'text-'));
    </script>

    <script src="/js/cart.js" defer></script>

    <script src="/js/chatbot.js" defer></script>
</body>
