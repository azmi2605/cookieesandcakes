<body
    class="bg-cream-texture min-h-screen flex items-center justify-center font-body-md text-on-surface p-margin-mobile md:p-margin-desktop">
    <!-- Password Reset Card -->
    <main
        class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl p-lg md:p-xl butter-shadow animate-fade-in-up">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-lg">
            <img alt="cookieesandcakes logo" class="h-16 md:h-20 w-auto object-contain mb-sm"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuAiStMYqPuvZnn9y9yjmDMSFMoDBQD1oP3VBehMJeA9HDKoXZ8rYc0UV_JVe-695v1xgRyTK0bKrb-Tfvu963LIxiuCgdc1G79UGNOMGzGEGhmKZ-ZS-hbSP8s-by-uW869dcHCa86pd5cUtb_BeIlZqppK8QXuA6BuBCPhE6ctmq8JhqcKPJ8IJiZcVi8TRI6pels6YmA_xrTIiuYf6MrM9csjBR8wsMlVRH_PpekAELLEyM4nNsExFwmTm6c7-X8-SZhvm7lAgw0" />
        </div>
        <!-- Heading Section -->
        <div class="text-center mb-lg">
            <h1 class="font-headline-lg text-headline-lg text-primary mb-sm">Forgot Your Password?</h1>
            <p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                No worries! Enter your email address below and we'll send you a link to reset your password and get you
                back to your treats.
            </p>
        </div>
        <!-- Reset Form -->
        <form class="space-y-md" id="reset-form" onsubmit="event.preventDefault(); handleResetSubmit();">
            <div class="flex flex-col space-y-xs">
                <label class="font-label-md text-label-md text-primary ml-1" for="email">Email Address</label>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
                    <input
                        class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-0 focus:border-primary transition-all duration-300 placeholder:text-on-tertiary-container"
                        id="email" placeholder="yourname@example.com" required="" type="email" />
                </div>
            </div>
            <!-- Primary Action -->
            <button
                class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-label-md text-label-md hover:bg-primary transition-all duration-300 transform active:scale-95 butter-shadow flex items-center justify-center gap-2"
                type="submit">
                Send Reset Link
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </button>
        </form>
        <!-- Secondary Action -->
        <div class="mt-lg text-center">
            <a class="inline-flex items-center gap-1 font-label-md text-label-md text-secondary hover:text-primary transition-colors duration-300 group"
                href="/signin.html">
                <span
                    class="material-symbols-outlined text-base group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Back to Login
            </a>
        </div>
    </main>
    <!-- Micro-interaction Script -->
    <script>
        function handleResetSubmit() {
            const button = document.querySelector('button[type="submit"]');
            const originalContent = button.innerHTML;

            // Loading State
            button.disabled = true;
            button.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            `;

            setTimeout(() => {
                button.disabled = false;
                button.innerHTML = originalContent;
            }, 2000);
        }
    </script>
