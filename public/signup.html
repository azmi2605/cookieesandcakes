<!DOCTYPE html>

<html class="light" lang="en">

<head>

    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign Up | Cookies &amp; Cakes</title>

    <link

                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-tint": "#79564a",
                        "error": "#ba1a1a",

    <style>
        body {
            background-color: #fff8f6;
            background-image:
                radial-gradient(at 0% 0%, rgba(255, 219, 207, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 233, 226, 0.3) 0px, transparent 50%);
            min-height: 100vh;
        }

        .butter-shadow {
            box-shadow: 0 20px 40px rgba(93, 62, 51, 0.08);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-overlay {
            backdrop-filter: blur(8px);
            background: rgba(255, 248, 246, 0.8);
        }

        .baker-input:focus {
            outline: none;
            border-color: #44281e;
            box-shadow: 0 0 0 1px #44281e;
        }

    <script src="/js/app.js" defer></script>

<body class="flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md text-on-surface min-h-screen flex flex-col">
    <!-- Main Registration Shell -->
    <main class="w-full max-w-[1200px] flex items-center justify-center min-h-[calc(100vh-128px)] flex-grow">
        <!-- Registration Card -->
        <div
            class="w-full max-w-[540px] bg-surface-container-lowest rounded-xl p-md md:p-lg butter-shadow relative overflow-hidden flex flex-col items-center">
            <!-- Branding Header -->
            <div class="mb-lg text-center">
                <img alt="Cookies &amp; Cakes Logo" class="h-20 w-auto mx-auto object-contain mb-md"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWjJ6c8KNON2M8RbA6m_gvP_lgoiz8uNUVxEmec_qXp7NV9wcFaHb-ZeawzyxqHHtJhQIz0HeoyvdFgX8k2-xfd4dJaKRj0vdLp4rSlRsO732Wzc0RrIdE1GhQ76zk2Qh5jBldxBoFw5uxkf1GR_nYvA5n1EYB8xsYosbd-WL5hk-lXkLh7HfjBww1X9Xw9M7eB_adDZIxTxdsa6kaiWCV0WF8EBLPd3NkZms2N6eS0Xa0oBwGeVgiKf0ypmRMYrPy3xvbHXAHa5c" />
                <h1 class="font-headline-md text-headline-md md:text-headline-lg text-primary mb-xs">New Here? Create an
                    Account!</h1>
                <p class="text-on-surface-variant font-body-md max-w-sm mx-auto">Join our community of treat lovers and
                    experience artisanal warmth in every bite.</p>
            </div>
            <!-- Benefits List (Bento-lite style) -->
            <div class="grid grid-cols-1 gap-base w-full mb-lg">
                <div
                    class="flex items-center gap-md p-sm bg-surface-container-low rounded-lg transition-all hover:bg-surface-container">
                    <span class="material-symbols-outlined text-secondary"
                        style="font-variation-settings: 'FILL' 1;">favorite</span>
                    <span class="font-label-md text-label-md text-primary">Save your favorite treats</span>
                </div>
                <div
                    class="flex items-center gap-md p-sm bg-surface-container-low rounded-lg transition-all hover:bg-surface-container">
                    <span class="material-symbols-outlined text-secondary"
                        style="font-variation-settings: 'FILL' 1;">bolt</span>
                    <span class="font-label-md text-label-md text-primary">Faster checkout</span>
                </div>
                <div
                    class="flex items-center gap-md p-sm bg-surface-container-low rounded-lg transition-all hover:bg-surface-container">
                    <span class="material-symbols-outlined text-secondary"
                        style="font-variation-settings: 'FILL' 1;">calendar_today</span>
                    <span class="font-label-md text-label-md text-primary">Exclusive early access to seasonal
                        bakes</span>
                </div>
            </div>
            <!-- Sign Up Form -->
            <form class="w-full space-y-md" onsubmit="event.preventDefault();">
                <div class="space-y-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant px-xs" for="full_name">Full
                        Name</label>
                    <input
                        class="w-full h-12 px-md rounded-lg border border-outline-variant bg-surface-bright baker-input text-on-surface transition-all"
                        id="full_name" placeholder="Evelyn Baker" type="text" />
                </div>
                <div class="space-y-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant px-xs" for="email">Email
                        Address</label>
                    <input
                        class="w-full h-12 px-md rounded-lg border border-outline-variant bg-surface-bright baker-input text-on-surface transition-all"
                        id="email" placeholder="evelyn@example.com" type="email" />
                </div>
                <div class="space-y-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant px-xs" for="password">Create
                        Password</label>
                    <div class="relative">
                        <input
                            class="w-full h-12 px-md rounded-lg border border-outline-variant bg-surface-bright baker-input text-on-surface transition-all"
                            id="password" placeholder="••••••••" type="password" />
                        <button
                            class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary"
                            type="button">
                            <span class="material-symbols-outlined text-[20px]">visibility</span>
                        </button>
                    </div>
                </div>
                <div class="flex items-start gap-sm pt-xs pb-md">
                    <input class="mt-1 rounded border-outline-variant text-secondary focus:ring-secondary" id="terms"
                        type="checkbox" />
                    <label class="text-label-sm font-label-sm text-on-surface-variant leading-tight" for="terms">
                        I agree to the <a class="text-secondary hover:underline" href="#">Terms of Service</a> and <a
                            class="text-secondary hover:underline" href="#">Privacy Policy</a>.
                    </label>
                </div>
                <!-- Main Action Button -->
                <button
                    class="w-full h-14 bg-secondary text-on-secondary font-label-md text-label-md rounded-lg butter-shadow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-base group"
                    type="submit">
                    Sign Up
                </button>
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-outline-variant/30"></div>
                    <span
                        class="flex-shrink mx-4 font-label-sm text-label-sm text-outline-variant uppercase tracking-wider">or
                        continue with</span>
                    <div class="flex-grow border-t border-outline-variant/30"></div>
                </div>
                <div class="grid grid-cols-2 gap-md">
                    <button
                        class="flex items-center justify-center space-x-2 py-3 border border-outline-variant rounded-lg hover:bg-surface-container transition-colors active:scale-95 duration-200"
                        id="google-signin-btn" type="button">
                        <img alt="Google" class="w-5 h-5"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDYqJSc_NTui5F0SuG8ZbtQpVS63fBOWOPyFGDQPGWkOPisxGBOxv1LvzzZqp6B0eNpCxumhJYECrxBH7bcd4kYF1u89jkW1Y0H76UC8P8gmTL3vvMqh6r3gczpe4aq4VqyGsjYhcsUxmaI0CiJSyPQS2zeLFP6covCaLkXEqtcvgUczpEu2dAu4J5VGQDJNevDMw5FaQla8yjJDKLD6wfmHrlhfde843Fdoep9YLUCxfJzExUMLezB8D8S9pb14Z2Zx99jQFzezC4" />
                        <span class="font-label-sm text-label-sm text-primary">Google</span>
                    </button>
                    <button
                        class="flex items-center justify-center space-x-2 py-3 border border-outline-variant rounded-lg hover:bg-surface-container transition-colors active:scale-95 duration-200"
                        id="apple-signin-btn" type="button">
                        <span class="material-symbols-outlined text-primary"
                            style="font-variation-settings: 'FILL' 1;">apps</span>
                        <span class="font-label-sm text-label-sm text-primary">Apple</span>
                    </button>
                </div>
            </form>
            <!-- Secondary Action -->
            <div class="mt-lg pt-md border-t border-surface-container-high w-full text-center">
                <p class="text-on-surface-variant font-label-md">
                    Already have an account?
                    <a class="text-primary font-bold hover:text-secondary transition-colors inline-flex items-center gap-xs"
                        href="/signin.html">
                        Sign In
                        <span class="material-symbols-outlined text-[16px]">login</span>
                    </a>
                </p>
            </div>
            <!-- Decorative Element -->
            <div
                class="absolute -bottom-12 -right-12 w-32 h-32 bg-primary-fixed opacity-10 rounded-full blur-3xl pointer-events-none">
            </div>
            <div
                class="absolute -top-12 -left-12 w-32 h-32 bg-secondary-fixed opacity-10 rounded-full blur-3xl pointer-events-none">
            </div>
        </div>
    </main>
    <!-- Micro-interaction Script -->
    <script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Simple password toggle logic
        const togglePass = document.querySelector('button[type="button"]');
        const passInput = document.querySelector('#password');
        if (togglePass && passInput) {
            togglePass.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                const icon = togglePass.querySelector('.material-symbols-outlined');
                icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        }
    </script>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://appleid.cdn-apple.com/appleauth/auth/js/lib/appleid/1/en_US/appleid.auth.js" async defer></script>

    <script src="/js/auth.js" defer></script>

    <script src="/js/social-auth.js" defer></script>

    <script src="/js/chatbot.js" defer></script>
</body>

</html>
