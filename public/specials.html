            color: #281811;

            vertical-align: middle;
        }

            transform: scale(0.98);

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));

<body class="font-body-md text-on-background selection:bg-secondary-fixed selection:text-on-secondary-fixed min-h-screen flex flex-col">
    <div data-include-header="/header/header.html"></div>
    <main class="pt-6 pb-xl px-margin-mobile md:px-margin-desktop max-w-[1200px] mx-auto flex-grow">
        <!-- Header Section -->
        <div class="mb-lg text-center md:text-left">
            <h1 class="font-headline-xl text-headline-xl text-primary mb-base">Today's Specials</h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">
                Small-batch creations, baked fresh this morning. Each piece is a unique celebration of seasonal flavors
                and artisanal craftsmanship.
            </p>
        </div>
        <!-- Specials Grid (Bento/Artisanal Card Layout) -->
        <div class="bakers-tray-grid" id="specials-grid">
            <!-- Cards injected dynamically by JS -->
            <div class="col-span-full py-xl text-center">
                <span class="font-body-lg text-on-surface-variant">Gathering today's special treats...</span>
            </div>
        </div>
    </main>
    <!-- Footer -->
    <div data-include-footer="/footer/footer.html"></div>
    <!-- Micro-interaction Scripts -->
    <script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });

        // Simple cart notification demo
        const cartButtons = document.querySelectorAll('button:has(span[data-icon="add_shopping_cart"])');
        cartButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                const rect = button.getBoundingClientRect();
                const notification = document.createElement('div');
                notification.className = 'fixed bg-secondary text-white px-4 py-2 rounded-full font-label-sm shadow-lg pointer-events-none z-50 transition-all duration-500 flex items-center gap-2';
                notification.innerHTML = '<span class="material-symbols-outlined text-[16px]">check_circle</span> Added to tray';
                notification.style.left = `${rect.left + (rect.width / 2)}px`;
                notification.style.top = `${rect.top}px`;
                notification.style.transform = 'translate(-50%, -100%) opacity(0)';

                document.body.appendChild(notification);

                requestAnimationFrame(() => {
                    notification.style.top = `${rect.top - 40}px`;
                    notification.style.opacity = '1';
                });

                setTimeout(() => {
                    notification.style.opacity = '0';
                    notification.style.top = `${rect.top - 60}px`;
                    setTimeout(() => notification.remove(), 500);
                }, 2000);
            });
        });
    </script>

    <script>
        (async () => {
            if (document.readyState === 'loading') {
                await new Promise(resolve => document.addEventListener('DOMContentLoaded', resolve, { once: true }));
            }
            const grid = document.getElementById('specials-grid');
            if (!grid) return;

            try {
                const products = await window.App.fetchAPI('/api/products');
                
                if (products.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-xl text-center text-on-surface-variant font-body-lg">
                            No specials available right now. Please check back later!
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = '';
                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'group flex flex-col bg-surface-container-lowest rounded-xl overflow-hidden butter-shadow transition-transform duration-500 hover:-translate-y-2 cursor-pointer';
                    card.setAttribute('data-product-id', product.id);
                    
                    const badgeHtml = product.tags && product.tags[0] ? `
                        <div class="absolute top-4 right-4 bg-primary/90 backdrop-blur-md text-white px-3 py-1 rounded-full text-label-sm">
                            ${product.tags[0]}
                        </div>
                    ` : '';

                    card.innerHTML = `
                        <div class="relative h-72 overflow-hidden">
                            <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                src="${product.image}"
                                alt="${product.name}" />
                            ${badgeHtml}
                        </div>
                        <div class="p-md flex flex-col flex-grow">
                            <div class="flex justify-between items-start mb-base">
                                <h3 class="font-headline-md text-headline-md text-primary">${product.name}</h3>
                                <span class="font-label-md text-label-md text-secondary">${window.App.formatPrice(product.price)}</span>
                            </div>
                            <p class="font-body-md text-body-md text-on-surface-variant mb-lg flex-grow">
                                ${product.description || 'A delicious artisanal treat from our bakery.'}
                            </p>
                            <div class="flex gap-base mt-auto">
                                <button class="add-to-tray-btn flex-grow bg-secondary text-on-secondary font-label-md py-3 rounded-lg active-scale transition-all hover:bg-on-secondary-fixed-variant shadow-sm flex items-center justify-center gap-2">
                                    <span class="material-symbols-outlined text-[18px]"
                                        data-icon="add_shopping_cart">add_shopping_cart</span>
                                    Add to Tray
                                </button>
                            </div>
                        </div>
                    `;

                    card.addEventListener('click', (e) => {
                        if (e.target.closest('.add-to-tray-btn')) return;
                        window.location.href = `/product-details.html?id=${product.id}`;
                    });

                    card.querySelector('.add-to-tray-btn').addEventListener('click', async (e) => {
                        e.stopPropagation();
                        
                        const allowed = await window.App.requireAuth({ returnUrl: window.location.pathname, message: 'Please log in to add items to your cart.' });
                        if (!allowed) return;
                        
                        try {
                            await window.App.fetchAPI('/api/cart', {
                                method: 'POST',
                                body: { productId: product.id, quantity: 1 }
                            });
                            await window.App.updateCartBadge();
                            window.App.toastSuccess(`${product.name} added to tray!`);
                        } catch (err) {
                            window.App.toastError(err.message);
                        }
                    });

                    grid.appendChild(card);
                });
            } catch (err) {
                console.error('Failed to load specials:', err.message);
                grid.innerHTML = `
                    <div class="col-span-full py-xl text-center text-on-surface-variant font-body-lg">
                        Failed to load specials. Please try again later.
                    </div>
                `;
            }
        })();
    </script>

    <script src="/js/treats.js" defer></script>
    <script src="/js/skeleton.js" defer></script>
    <script src="/js/chatbot.js" defer></script>
</body>
