<!-- Main Sign Up Card -->

<div class="p-lg md:p-xl flex flex-col items-center">
<!-- Logo Section -->

<p class="text-on-surface-variant font-body-md">Create an account to start your sweet journey</p>
</div>
<!-- Sign Up Form -->
<form class="w-full space-y-md" onsubmit="return false;">
<!-- Full Name Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="full_name">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant/60">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full pl-xl pr-md py-sm bg-surface rounded-lg border border-outline-variant text-on-surface placeholder:text-outline-variant/70 input-focus transition-all" id="full_name" name="full_name" placeholder="E.g. Jane Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant/60">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-xl pr-md py-sm bg-surface rounded-lg border border-outline-variant text-on-surface placeholder:text-outline-variant/70 input-focus transition-all" id="email" name="email" placeholder="jane@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant/60">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-xl pr-xl py-sm bg-surface rounded-lg border border-outline-variant text-on-surface placeholder:text-outline-variant/70 input-focus transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-on-surface-variant hover:text-primary transition-colors" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibility_icon">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm pt-xs">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20" id="terms" type="checkbox"/>
<label class="text-label-sm text-on-surface-variant leading-snug" for="terms">
                        I agree to the <a class="text-secondary hover:underline" href="#">Terms of Service</a> and <a class="text-secondary hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Primary Action Button -->
<button class="w-full mt-md py-md bg-primary-container text-white font-label-md rounded-lg shadow-lg hover:shadow-xl hover:bg-primary active:scale-[0.98] transition-all duration-200" type="submit">
                    Sign Up

<!-- Interaction Script -->
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('visibility_icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Simple entrance animation delay simulation
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('main');
            card.style.opacity = '0';
            card.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                card.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
